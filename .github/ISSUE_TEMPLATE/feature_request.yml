name: Feature Request
description: Requesting a new feature or changes to an existing feature
title: "[FEATURE]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you continue
        Please search our [open/closed issues](https://github.com/Vateron-Media/XC_VM/issues?q=is%3Aissue+label%3Aenhancement) to see if a similar request already exists.

  - type: checkboxes
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the system does this feature relate to?
      options:
        - "Admin Panel (UI)"
        - "Streaming (live/VOD/timeshift)"
        - "Player API"
        - "Reseller Panel"
        - "EPG"
        - "Nginx / Load Balancer"
        - "Installation / Update"
        - "CLI / Cron"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A detailed description of the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Use Case / Motivation
      description: Why is this change important? How would you use it? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: possiblesolution
    attributes:
      label: Proposed Solution
      description: If you have a specific implementation idea, describe it here. Code snippets welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches? What are their pros/cons?

  - type: textarea
    id: extrainformation
    attributes:
      label: Additional Information
      description: Screenshots, mockups, links to similar features in other projects, etc.